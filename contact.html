<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLab — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="wrap">
            <a href="index.html" class="brand">DecodeLab</a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="features.html">Features</a>
                <a href="courses.html">Courses</a>
                <a href="contact.html">Contact</a>
            </nav>
            <button class="theme-btn" id="themeBtn" type="button">Dark Mode</button>
        </div>
    </header>

    <main>
        <section class="contact">
            <div class="wrap contact-box">
                <div class="contact-text">
                    <p class="tag">Start now</p>
                    <h2>Build skills with steady progress</h2>
                    <p>Join a simple learning experience designed for students who want practical frontend confidence.</p>
                </div>
                <form id="signupForm" class="form" novalidate>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input id="name" name="name" type="text" placeholder="Your name">
                        <small class="error" aria-live="polite"></small>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="Email address">
                        <small class="error" aria-live="polite"></small>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Create a password">
                        <small class="error" aria-live="polite"></small>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirm Password</label>
                        <input id="confirm" name="confirm" type="password" placeholder="Confirm password">
                        <small class="error" aria-live="polite"></small>
                    </div>
                    <button class="btn btn-main" type="submit">Join Waitlist</button>
                    <div id="formSuccess" class="form-success" role="status" aria-live="polite" hidden>Success! You're on the waitlist.</div>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
